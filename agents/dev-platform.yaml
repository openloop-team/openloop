# Example team agent — config-as-code.
#
# This is a PRELIMINARY schema (apiVersion v1alpha1) and will evolve.
# Register it with the (placeholder) CLI:
#   openloop agents apply -f agents/dev-platform.yaml
apiVersion: openloop.ai/v1alpha1
kind: Agent
metadata:
  name: dev-platform
  workspace: acme

spec:
  # Surfaces where this team agent is reachable
  surfaces:
    - type: slack
      channel: "#dev-platform"
    - type: discord
      channel: "eng"

  # Memory can be scoped per channel so context doesn't leak across teams
  memory:
    scope: channel
    backend: postgres        # pgvector-backed
    retention_days: 90

  # Which models handle which kinds of task
  model_policy:
    default: openai/gpt-4o-mini
    routes:
      - match: { task: summarize }
        model: groq/llama-3.1-8b-instant
      - match: { task: code }
        model: anthropic/claude-opus-4-8
      - match: { task: investigate }
        model: anthropic/claude-sonnet-4-6

  # Explicit tool allowlist (least privilege).
  #
  # GitHub is split across two tools: broad *read* coverage comes from GitHub's
  # official MCP server (provider-maintained tools, added via config not code),
  # while *writes* stay on the native connector — that's where approval gating,
  # tailored approval summaries, and the credential seam live.
  tools:
    - name: github
      type: native
      # issues:read / pulls:read are transitional: remove them once github-mcp
      # auth is wired, so the model sees exactly one way to read.
      permissions: ["issues:read", "issues:write", "pulls:read", "pulls:write"]
    # Uncomment once HttpMCPClient can send a bearer token (wire it through the
    # CredentialResolver seam). Left disabled until then because a configured
    # server is dialed at every startup — including each test-suite app boot —
    # and without auth the discovery call can only fail. After enabling,
    # confirm the tool names against the startup discovery log, and drop the
    # native read permissions above.
    - name: github-mcp
      type: mcp
      server: https://api.githubcopilot.com/mcp/
      permissions:
        - list_issues
        - get_issue
        - search_issues
        - list_pull_requests
        - get_pull_request
    - name: coding_worker
      type: native
      # Runs the worker (clone → model-edit → commit → push) and opens a draft PR.
      permissions: ["pr:write"]
    - name: ci-logs
      type: mcp
      server: http://localhost:8931
      # For MCP tools, permissions are the exact server tool names the agent
      # may call (least privilege); discovered from the server at startup.
      permissions: [get_run_logs, list_runs]

  # Risky / write actions require a human
  approvals:
    require_for:
      - github.issues:write
      - github.pulls:write
      # Gates the worker STARTING + opening a draft PR — not a diff review.
      - coding_worker.pr:write
    approvers: ["@maciag.artur"]

  # Spend guardrails
  budget:
    monthly_usd: 50
    per_task_usd: 0.50
    on_exceeded: block        # block | warn

  # Throughput guardrails (noisy-neighbor controls); unset = unlimited
  limits:
    max_concurrent_tasks: 4   # tasks in flight at once for this agent
    tasks_per_minute: 30      # task starts per minute for this agent
