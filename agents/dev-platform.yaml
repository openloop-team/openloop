# Example team agent — config-as-code.
#
# This is a PRELIMINARY schema (apiVersion v1alpha1) and will evolve.
# Register it with the (placeholder) CLI:
#   openloop agents apply -f agents/dev-platform.yaml
apiVersion: openloop.team/v1alpha1
kind: Agent
metadata:
  name: openloop
  workspace: openloop-team

spec:
  # Surfaces where this team agent is reachable
  surfaces:
    - type: slack
      channel: "#dev-platform"
    - type: discord
      channel: "eng"

  # Memory can be scoped per channel so context doesn't leak across teams
  memory:
    scope: channel
    backend: postgres        # pgvector-backed
    retention_days: 90

  # Which models handle which kinds of task. The default is what drives the
  # tool loop (tasks arrive without a kind), so it must be a model that picks
  # tools reliably — mini-class models are summarize-only.
  model_policy:
    default: anthropic/claude-sonnet-4-6
    routes:
      - match: { task: summarize }
        model: openai/gpt-4o-mini
      - match: { task: code }
        model: anthropic/claude-opus-4-8
      - match: { task: investigate }
        model: anthropic/claude-sonnet-4-6

  # Explicit tool allowlist (least privilege).
  #
  # GitHub is split across two tools: broad *read* coverage comes from GitHub's
  # official MCP server (provider-maintained tools, added via config not code),
  # while *writes* stay on the native connector — that's where approval gating,
  # tailored approval summaries, and the credential seam live.
  tools:
    - name: github
      type: native
      permissions: ["issues:write", "pulls:write"]
    - name: github-mcp
      type: mcp
      server: https://api.githubcopilot.com/mcp/
      # Authorization: Bearer <token>, resolved per request from the "github"
      # credential integration (GITHUB_TOKEN or GitHub App installation
      # tokens). X-MCP-Readonly asks GitHub's server to expose only read
      # tools — defense in depth on top of the permissions allowlist, which
      # names the exact server tools the agent may call (verified against the
      # startup discovery log; e.g. single-issue/PR reads are the consolidated
      # issue_read / pull_request_read tools, not get_issue / get_pull_request).
      #
      # X-MCP-Toolsets pins which server toolsets are exposed. It REPLACES the
      # server default (not additive), so it must list every toolset the tools
      # below live in: `issues` (list_issues, issue_read, search_issues),
      # `pull_requests` (list_pull_requests, pull_request_read), and `actions`
      # for CI/GitHub Actions reads. Pinning is also least-privilege — it keeps
      # the discovery surface to these three groups (12 read tools) rather than
      # the ~28-tool default, and shields us from server-side default drift.
      credentials: github
      headers:
        X-MCP-Readonly: "true"
        X-MCP-Toolsets: "issues,pull_requests,actions"
      permissions:
        - list_issues
        - issue_read
        - search_issues
        - list_pull_requests
        - pull_request_read
        # GitHub Actions / CI reads (consolidated tools, readonly-safe):
        #   actions_list — list workflows, runs, jobs, artifacts
        #   actions_get  — get a workflow / run / job / artifact by id
        #   get_job_logs — job logs (single job_id, or run_id + failed_only)
        - actions_list
        - actions_get
        - get_job_logs
    - name: coding_worker
      type: native
      # Runs the worker (clone → model-edit → commit → push) and opens a draft PR.
      permissions: ["pr:write"]

  # Risky / write actions require a human
  approvals:
    require_for:
      - github.issues:write
      - github.pulls:write
      # Gates the worker STARTING + opening a draft PR — not a diff review.
      - coding_worker.pr:write
    approvers: ["@maciag.artur"]

  # Spend guardrails
  budget:
    monthly_usd: 50
    # The OpenHands coding worker is multi-step and token-heavy — observed runs
    # land around $0.8–1.0. Keep this above real task cost or every attempt
    # fails closed AFTER spending (the ledger cap is enforced post-run); the
    # in-run guard bounds a run to roughly this ceiling.
    per_task_usd: 1.50
    on_exceeded: block        # block | warn

  # Throughput guardrails (noisy-neighbor controls); unset = unlimited
  limits:
    max_concurrent_tasks: 4   # tasks in flight at once for this agent
    tasks_per_minute: 30      # task starts per minute for this agent
