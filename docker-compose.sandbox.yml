# Opt-in sibling-container sandbox support for either Compose stack:
#
#   docker compose -f docker-compose.yml -f docker-compose.sandbox.yml up --build
#   docker compose -f docker-compose.deploy.yml -f docker-compose.sandbox.yml up -d --build
#
# Enable ANALYSIS_WORKER_ENABLED=true and/or CODING_WORKER_SANDBOX=docker in
# .env for the workers that should use this access.
# OPENLOOP_SANDBOX_ROOT must be an absolute host path, mounted at the same path
# in the runtime, and writable by the runtime's numeric UID/GID.
#
# SECURITY: access to the Docker API is daemon-equivalent authority. Use this
# only when the OpenLoop runtime and host are trusted and single-tenant.

services:
  runtime:
    # Unix socket authorization uses the host socket's numeric GID. This lets
    # a non-root runtime connect without changing the socket mode or running
    # the controller as root. Set DOCKER_GID from the daemon host with:
    #   stat -c '%g' /var/run/docker.sock
    group_add:
      - ${DOCKER_GID:-0}
    environment:
      # Sibling containers resolve bind mounts on the Docker daemon's host.
      # Both workers therefore use children of the same host-visible root that
      # is mounted into this controller at an identical absolute path.
      CODING_WORKER_WORKSPACE_DIR: ${OPENLOOP_SANDBOX_ROOT:?Set OPENLOOP_SANDBOX_ROOT to a pre-created absolute host path}/coding
      ANALYSIS_WORKER_WORKSPACE_DIR: ${OPENLOOP_SANDBOX_ROOT:?Set OPENLOOP_SANDBOX_ROOT to a pre-created absolute host path}/analysis
    volumes:
      - type: bind
        source: ${DOCKER_SOCKET:-/var/run/docker.sock}
        target: /var/run/docker.sock
      - type: bind
        source: ${OPENLOOP_SANDBOX_ROOT:?Set OPENLOOP_SANDBOX_ROOT to a pre-created absolute host path}
        target: ${OPENLOOP_SANDBOX_ROOT:?Set OPENLOOP_SANDBOX_ROOT to a pre-created absolute host path}
